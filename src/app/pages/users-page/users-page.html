<div class="p-6 space-y-6">

  <!-- SEARCH -->
  <div class="p-4 rounded-lg shadow">
    <mat-form-field appearance="outline" class="w-full max-w-xs text-sm">
      <input matInput placeholder="Search" (keyup)="applyFilter($event)">
    </mat-form-field>
  </div>

  <!-- TABLE -->
  <div class="p-4 rounded-lg shadow">
    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort class="mat-table-bordered">

        <!-- ID -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header
              class="px-4 py-3 text-sm font-semibold text-(--color-text-muted)">
            ID
          </th>
          <td mat-cell *matCellDef="let element" class="px-4 py-3 text-sm">
            {{ element.id }}
          </td>
        </ng-container>

        <!-- NAME -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header
              class="px-4 py-3 text-sm font-semibold text-(--color-text-muted)">
            Name
          </th>
          <td mat-cell *matCellDef="let element" class="px-4 py-3 text-sm">
            {{ element.name }}
          </td>
        </ng-container>

        <!-- EMAIL -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header
              class="px-4 py-3 text-sm font-semibold text-(--color-text-muted)">
            Email
          </th>
          <td mat-cell *matCellDef="let element" class="px-4 py-3 text-sm">
            {{ element.email }}
          </td>
        </ng-container>

        <!-- HEADER -->
        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns">
        </tr>

        <!-- ROW -->
        <tr mat-row
            *matRowDef="let _row; columns: displayedColumns; let _i = index">
        </tr>

      </table>

      <mat-paginator class="mt-4"
        [pageSize]="10"
        [pageSizeOptions]="[10, 20, 100]">
      </mat-paginator>

    </div>

  </div>

</div>
