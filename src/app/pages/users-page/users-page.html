<div class="p-6 space-y-6">

  <div class="px-4 py-3 flex flex-col sm:flex-row sm:items-center sm:justify-between">
    <!-- LEFT -->
    <div class="min-w-0 flex-1 flex items-center">
      <h2 class="mt-1 text-2xl font-semibold tracking-tight leading-none md:text-3xl">
        List Users
      </h2>
    </div>
    <!-- RIGHT -->
    <div class="mt-2 sm:mt-0 flex items-center font-medium text-[13px]">
      <a class="whitespace-nowrap text-(--color-text-muted)">List</a>
      <div class="ml-2 flex items-center gap-1.5 whitespace-nowrap">
        <mat-icon
          class="w-3.5 h-3.5"
          svgIcon="heroicons_mini:chevron-right"
        ></mat-icon>
        <a routerLink="/users/add" class="cursor-pointer hover:underline">
          Add
        </a>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="p-4 rounded-lg shadow">
    <!-- SEARCH -->
    <div class="mb-4">
      <mat-form-field appearance="outline" class="w-full max-w-xs text-sm">
        <input matInput placeholder="Search" (keyup)="applyFilter($event)">
      </mat-form-field>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort class="mat-table-bordered">

        <!-- ID -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header
              class="px-4 py-3 text-sm font-semibold text-(--color-text-muted)">
            ID
          </th>
          <td mat-cell *matCellDef="let element" class="px-4 py-3 text-sm">
            {{ element.id }}
          </td>
        </ng-container>

        <!-- NAME -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header
              class="px-4 py-3 text-sm font-semibold text-(--color-text-muted)">
            Name
          </th>
          <td mat-cell *matCellDef="let element" class="px-4 py-3 text-sm">
            {{ element.name }}
          </td>
        </ng-container>

        <!-- EMAIL -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header
              class="px-4 py-3 text-sm font-semibold text-(--color-text-muted)">
            Email
          </th>
          <td mat-cell *matCellDef="let element" class="px-4 py-3 text-sm">
            {{ element.email }}
          </td>
        </ng-container>

        <!-- HEADER -->
        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns">
        </tr>

        <!-- ROW -->
        <tr mat-row
            *matRowDef="let _row; columns: displayedColumns; let _i = index">
        </tr>

      </table>

      <mat-paginator class="mt-4"
                     [pageSize]="10"
                     [pageSizeOptions]="[10, 20, 100]">
      </mat-paginator>

    </div>

  </div>

</div>
