<div class="flex flex-col h-screen">

  <!-- HEADER -->
  <header class="bg-gray-800 text-white flex items-center justify-between px-4 h-16 relative z-100">

    <!-- LEFT -->
    <div class="flex items-center">
      <button
        (click)="toggleSidebar()"
        class="text-white text-2xl cursor-pointer
         hover:bg-gray-700 active:scale-95
         px-2 py-1 rounded transition">
        ☰
      </button>
      <h1 class="font-bold text-lg">My App</h1>
    </div>

    <!-- RIGHT -->
    <div class="relative" #menuRef>

      <!-- BUTTON -->
      <div
        (click)="toggleUserMenu($event)"
        class="flex items-center space-x-3 cursor-pointer">
        <img src="https://i.pravatar.cc/40" class="w-8 h-8 rounded-full" alt="">
        <span class="hidden md:block">Ghitha Dinan</span>
      </div>

      <!-- DROPDOWN -->
      <div
        class="absolute right-0 mt-2 w-40 bg-white text-black rounded shadow-lg z-200
           transition-all duration-200"
        [class.opacity-100]="isUserMenuOpen"
        [class.opacity-0]="!isUserMenuOpen"
        [class.pointer-events-auto]="isUserMenuOpen"
        [class.pointer-events-none]="!isUserMenuOpen">

        <a class="block px-4 py-2 hover:bg-gray-100 cursor-pointer text-sm">Profile</a>
        <a class="block px-4 py-2 hover:bg-gray-100 cursor-pointer text-sm">Settings</a>
        <a class="block px-4 py-2 hover:bg-gray-100 cursor-pointer text-sm">Logout</a>

      </div>

    </div>

  </header>

  <!-- BODY -->
  <div class="flex flex-1 relative overflow-hidden">

    <!-- SIDEBAR (COLLAPSIBLE) -->
    <aside
      class="bg-gray-900 text-white
         md:relative fixed inset-y-0 left-0
         z-90
         transform transition-all duration-300 ease-in-out
         overflow-hidden"
      [class.w-64]="isSidebarOpen"
      [class.w-0]="!isSidebarOpen">

      <div
        class="w-64 p-4 space-y-2 transition-opacity duration-200"
        [class.opacity-100]="isSidebarOpen"
        [class.opacity-0]="!isSidebarOpen">

        <h2 class="text-lg font-semibold mb-4">Menu</h2>
        <a routerLink="/" (click)="isMobile && toggleSidebar()"
           class="block p-2 rounded hover:bg-gray-700 text-sm">Dashboard</a>
        <a routerLink="/users" (click)="isMobile && toggleSidebar()"
           class="block p-2 rounded hover:bg-gray-700 text-sm">Users</a>
        <a routerLink="/settings" (click)="isMobile && toggleSidebar()" class="block p-2 rounded hover:bg-gray-700 text-sm">Settings</a>

      </div>

    </aside>

    <!-- OVERLAY (mobile only) -->
    @if (isSidebarOpen) {
      <div
        class="fixed top-0 left-64 right-0 bottom-0 z-80 md:hidden
         bg-black/5
         transition-opacity duration-300 ease-in-out"
        [class.opacity-100]="isSidebarOpen"
        [class.opacity-0]="!isSidebarOpen"
        [class.pointer-events-auto]="isSidebarOpen"
        [class.pointer-events-none]="!isSidebarOpen"
        (click)="toggleSidebar()">
      </div>
    }

    <!-- CONTENT -->
    <main class="flex-1 p-6 bg-gray-100 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>

  </div>

  <!-- FOOTER -->
  <footer class="bg-gray-800 text-white text-center p-2">
    © 2026 My App
  </footer>

</div>
